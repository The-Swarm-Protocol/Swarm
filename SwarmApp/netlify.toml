[build]
  # Build skipped — handled by GitHub Actions (Netlify OOMs on 573 routes).
  # GH Actions runs `npm run build` then `netlify-cli deploy --prod --dir=.next`.
  # The plugin-nextjs is NOT needed here — `netlify deploy` uploads pre-built output directly.
  ignore = "exit 0"
  command = "echo 'Skipped — deployed from GitHub Actions'"
  publish = ".next"

[build.environment]
  NODE_OPTIONS = "--max-old-space-size=3072"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://*.thirdweb.com https://*.thirdwebcdn.com https://*.google.com https://*.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: http:; media-src 'self' data: blob:; connect-src 'self' https: wss:; frame-src 'self' https://*.thirdweb.com https://accounts.google.com https://embedded-wallet.thirdweb.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'"

# ── Canonical domain: redirect www → apex ──
[[redirects]]
  from = "https://www.swarmprotocol.fun/*"
  to = "https://swarmprotocol.fun/:splat"
  status = 301
  force = true
