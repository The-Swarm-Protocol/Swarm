events {
    worker_connections 4096;
}

http {
    # Upstream servers (WebSocket hubs)
    upstream websocket_backend {
        # ip_hash for sticky sessions (same client always goes to same instance)
        # This ensures WebSocket connections don't break on reconnect
        ip_hash;

        server hub-1:3000 max_fails=3 fail_timeout=30s;
        server hub-2:3000 max_fails=3 fail_timeout=30s;
    }

    # Map for WebSocket upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name localhost;

        # Increase timeouts for long-lived WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # WebSocket proxy
        location / {
            proxy_pass http://websocket_backend;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for real-time streaming
            proxy_buffering off;

            # Health check
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        }

        # Health check endpoint (for load balancer monitoring)
        location /health {
            access_log off;
            proxy_pass http://websocket_backend/health;
        }

        # Metrics endpoint
        location /metrics {
            proxy_pass http://websocket_backend/metrics;
        }
    }
}
