name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─── SwarmApp jobs ─────────────────────────────────────────────────────────────

jobs:
  lint:
    name: Lint (SwarmApp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SwarmApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SwarmApp/package-lock.json
      - run: npm ci
      - run: npm run lint || true

  test:
    name: Test (SwarmApp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SwarmApp
    env:
      PLATFORM_ADMIN_WALLETS: "0x723708273e811a07d90d2e81e799b9Ab27F0B549"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SwarmApp/package-lock.json
      - run: npm ci
      - run: npm run test:run

  build:
    name: Build (SwarmApp)
    needs: [lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SwarmApp
    env:
      # Minimal env vars to satisfy Next.js build (no real credentials)
      NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci-placeholder.firebaseapp.com"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-placeholder"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "ci-placeholder.appspot.com"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000"
      NEXT_PUBLIC_THIRDWEB_CLIENT_ID: "ci-placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SwarmApp/package-lock.json
      - run: npm ci
      - run: npm run build

  # Deploy handled by Vercel — auto-deploys on push to main.
  # Set env vars in Vercel Dashboard → Settings → Environment Variables.

# ─── Hub jobs ──────────────────────────────────────────────────────────────────

  hub-test:
    name: Test (Hub)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hub/package-lock.json
      - run: npm ci
      - run: npm test
        # Unit tests only — no Firebase/Redis required

# ─── Contracts jobs ────────────────────────────────────────────────────────────

  contracts-compile:
    name: Compile (Contracts)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    env:
      # Hardhat config requires DEPLOYER_PRIVATE_KEY at load time.
      # Use a throwaway non-functional key for compile/test.
      DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
      - run: npm run compile

  contracts-test:
    name: Test (Contracts)
    needs: [contracts-compile]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    env:
      DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
      - run: npm test
        # Runs against Hardhat in-process network — no Sepolia required

# ─── Release gate ──────────────────────────────────────────────────────────────

  gate:
    name: Release Gate
    needs: [build, hub-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          echo "✓ SwarmApp: lint, typecheck, test, build"
          echo "✓ Hub: unit tests"
          echo "✓ Contracts: compile + test"
          echo "SHA: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
          echo "This commit is release-safe for staging/testnet deployment."
