name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─── SwarmApp jobs ─────────────────────────────────────────────────────────────

jobs:
  lint:
    name: Lint (SwarmApp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SwarmApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SwarmApp/package-lock.json
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check (SwarmApp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SwarmApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SwarmApp/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Test (SwarmApp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SwarmApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SwarmApp/package-lock.json
      - run: npm ci
      - run: npm run test:run

  build:
    name: Build (SwarmApp)
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SwarmApp
    env:
      # Minimal env vars to satisfy Next.js build (no real credentials)
      NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci-placeholder.firebaseapp.com"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-placeholder"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "ci-placeholder.appspot.com"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000"
      NEXT_PUBLIC_THIRDWEB_CLIENT_ID: "ci-placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SwarmApp/package-lock.json
      - run: npm ci
      - run: npm run build

  # ── Deploy to Netlify from GitHub Actions (Netlify OOMs on 573 routes) ──

  deploy:
    name: Deploy (Netlify)
    needs: [build, hub-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SwarmApp
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      NEXT_PUBLIC_THIRDWEB_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_THIRDWEB_CLIENT_ID }}
      NEXT_PUBLIC_APP_DOMAIN: ${{ secrets.NEXT_PUBLIC_APP_DOMAIN }}
      NEXT_PUBLIC_ADMIN_ADDRESS: ${{ secrets.NEXT_PUBLIC_ADMIN_ADDRESS }}
      NEXT_PUBLIC_HEDERA_CHAIN_ID: ${{ secrets.NEXT_PUBLIC_HEDERA_CHAIN_ID }}
      NEXT_PUBLIC_HEDERA_RPC_URL: ${{ secrets.NEXT_PUBLIC_HEDERA_RPC_URL }}
      NEXT_PUBLIC_HEDERA_TREASURY: ${{ secrets.NEXT_PUBLIC_HEDERA_TREASURY }}
      NEXT_PUBLIC_HEDERA_AGENT_REGISTRY: ${{ secrets.NEXT_PUBLIC_HEDERA_AGENT_REGISTRY }}
      NEXT_PUBLIC_HEDERA_ASN_REGISTRY: ${{ secrets.NEXT_PUBLIC_HEDERA_ASN_REGISTRY }}
      NEXT_PUBLIC_HEDERA_TASK_BOARD: ${{ secrets.NEXT_PUBLIC_HEDERA_TASK_BOARD }}
      NEXT_PUBLIC_HEDERA_AGENT_NFT: ${{ secrets.NEXT_PUBLIC_HEDERA_AGENT_NFT }}
      NEXT_PUBLIC_HEDERA_MOCK_LINK: ${{ secrets.NEXT_PUBLIC_HEDERA_MOCK_LINK }}
      NEXT_PUBLIC_GITHUB_APP_SLUG: ${{ secrets.NEXT_PUBLIC_GITHUB_APP_SLUG }}
      NEXT_PUBLIC_SUPER_ADMINS: ${{ secrets.NEXT_PUBLIC_SUPER_ADMINS }}
      NEXT_PUBLIC_OPENCLAW_WORKSPACE: ${{ secrets.NEXT_PUBLIC_OPENCLAW_WORKSPACE }}
      NEXT_PUBLIC_TREASURY_ADDRESS: ${{ secrets.NEXT_PUBLIC_TREASURY_ADDRESS }}
      NEXT_PUBLIC_THIRDWEB_SECRET: ${{ secrets.NEXT_PUBLIC_THIRDWEB_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SwarmApp/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=.next --site=${{ secrets.NETLIFY_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}

# ─── Hub jobs ──────────────────────────────────────────────────────────────────

  hub-test:
    name: Test (Hub)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hub/package-lock.json
      - run: npm ci
      - run: npm test
        # Unit tests only — no Firebase/Redis required

# ─── Contracts jobs ────────────────────────────────────────────────────────────

  contracts-compile:
    name: Compile (Contracts)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    env:
      # Hardhat config requires DEPLOYER_PRIVATE_KEY at load time.
      # Use a throwaway non-functional key for compile/test.
      DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
      - run: npm run compile

  contracts-test:
    name: Test (Contracts)
    needs: [contracts-compile]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    env:
      DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
      - run: npm test
        # Runs against Hardhat in-process network — no Sepolia required

# ─── Release gate ──────────────────────────────────────────────────────────────

  gate:
    name: Release Gate
    needs: [build, hub-test, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          echo "✓ SwarmApp: lint, typecheck, test, build"
          echo "✓ Hub: unit tests"
          echo "✓ Contracts: compile + test"
          echo "SHA: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
          echo "This commit is release-safe for staging/testnet deployment."
